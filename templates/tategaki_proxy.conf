# これはtategaki用のリバースプロキシ設定サンプルです。必要に応じて編集してください。
server {
    listen 80;
    listen [::]:80;
    server_name tategaki.${DOMAIN};

    # Certbotの http-01 challenge は nginx から直接返す
    location ^~ /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen       443 ssl; http2 on;
    listen  [::]:443 ssl;
    server_name tategaki.${DOMAIN};

    ssl_certificate      /etc/letsencrypt/live/tategaki.${DOMAIN}/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/tategaki.${DOMAIN}/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.3 TLSv1.2;
    ssl_ciphers 'ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=2592000" always;

    proxy_redirect                          off;
    proxy_set_header Host                   $host;
    proxy_set_header X-Real-IP              $remote_addr;
    proxy_set_header X-Forwarded-Host       $host;
    proxy_set_header X-Forwarded-Server     $host;
    proxy_set_header X-Forwarded-Proto      $scheme;
    proxy_set_header X-Forwarded-For        $proxy_add_x_forwarded_for;

    # HTTPS到達時も challenge をアプリに流さない
    location ^~ /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    # tategakiコンテナにプロキシ (内部ポート 3000)
    location / {
        proxy_pass http://172.30.0.130:3000;
    }

    # redirect server error pages to the static page /50x.html
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
