# X-Forwarded-Forが空の場合はremote_addrを使用するmap設定
map $http_x_forwarded_for $real_ip {
    ""      $remote_addr;  # 直接アクセスの場合はremote_addrを使用
    default $http_x_forwarded_for;  # プロキシ経由の場合はX-Forwarded-Forを使用
}

log_format real_ip '$real_ip - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent"';

access_log /var/log/nginx/access.log real_ip;

